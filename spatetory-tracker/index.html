<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spatetory</title>
    <link rel="stylesheet" href="css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="//cdn.jsdelivr.net/npm/globe.gl"></script>
</head>

<body>
    <div id="top-bar">
        <h1>Spactetory</h1>
        <h2>System: <span class="status-online">Online</span></h2>
    </div>

    <main class="dashboard-container">
        <section class="telemetry-iss">
            <h3 class="wheres-iss">Where is ISS?</h3>
            <div class="data-field">
                <span class="data-label">Latitude:</span>
                <span id="latitude" class="data-value">Loading...</span>
            </div>
            <div class="data-field">
                <span class="data-label">Longitude:</span>
                <span id="longitude" class="data-value">Loading...</span>
            </div>
        </section>
    </main>

    <div id="globeContainer"></div>
    
    <script src="js/earth.js"></script>
    <script src="js/isstelemetry.js"></script> /* kerjain woii huhu */
</body>
</html>
